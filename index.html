<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Narindra Yogi Pradana | Coming Soon</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap"
      rel="stylesheet" />

    <style>
      :root {
        --accent-color: #3d5afe;
        --bg-color: #f8f9fa;
        --text-color: #1a1a1a;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .container {
        text-align: center;
        padding: 2rem;
        max-width: 600px;
      }

      .logo {
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: 2px;
        margin-bottom: 2rem;
      }

      .logo span {
        color: var(--accent-color);
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 1rem;
        letter-spacing: -1px;
      }

      p {
        font-size: 1.1rem;
        color: #6c757d;
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      .loader {
        width: 50px;
        height: 50px;
        border: 5px solid #e0e0e0;
        border-top: 5px solid var(--accent-color);
        border-radius: 50%;
        display: inline-block;
        animation: spin 1s linear infinite;
        margin-bottom: 2rem;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .social-links a {
        color: var(--text-color);
        font-size: 1.5rem;
        margin: 0 15px;
        text-decoration: none;
        opacity: 0.6;
        transition: 0.3s;
      }

      .social-links a:hover {
        opacity: 1;
        color: var(--accent-color);
        transform: translateY(-3px);
      }

      .badge {
        background: rgba(61, 90, 254, 0.1);
        /* color: var(--accent-color); */
        color: rgb(255, 146, 4);
        padding: 8px 16px;
        border-radius: 50px;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 1rem;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">YOG Web Portofolio<span>.</span></div>

      <div class="badge">Coming Soon, please stay tuned ^^</div>
    </div>
  </body>
</html>
